<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SYS WMS Pro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/themes.css"/>
    <script src="js/settings.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "secondary-fixed": "#d7e4ec",
                        "on-primary-fixed-variant": "#6a3c00",
                        "on-surface-variant": "#554434",
                        "background": "#f8f9fa",
                        "on-secondary-fixed": "#111d23",
                        "outline": "#887362",
                        "tertiary-fixed": "#cae6ff",
                        "on-primary-container": "#5c3300",
                        "inverse-primary": "#ffb872",
                        "primary-fixed": "#ffdcbe",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-container": "#004161",
                        "tertiary-fixed-dim": "#8cceff",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed": "#2d1600",
                        "on-secondary-container": "#5a666d",
                        "outline-variant": "#dbc2ae",
                        "secondary": "#546067",
                        "primary-container": "#ea580c",
                        "surface-dim": "#d9dadb",
                        "tertiary-container": "#0db2ff",
                        "error": "#ba1a1a",
                        "tertiary": "#006492",
                        "secondary-container": "#f1f5f9",
                        "surface": "#f8fafc",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-fixed": "#001e2f",
                        "primary-fixed-dim": "#ffb872",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f1f5f9",
                        "surface-bright": "#f8f9fa",
                        "surface-variant": "#e2e8f0",
                        "on-tertiary-fixed-variant": "#004b6f",
                        "error-container": "#ffdad6",
                        "on-background": "#0f172a",
                        "on-surface": "#0f172a",
                        "on-secondary-fixed-variant": "#3c494f",
                        "surface-container-low": "#f8fafc",
                        "primary": "#ea580c",
                        "surface-tint": "#ea580c",
                        "surface-container-high": "#e2e8f0",
                        "secondary-fixed-dim": "#bbc8d0"
                    },
                    fontFamily: {
                        "headline": ["var(--wms-font)", "Inter", "sans-serif"],
                        "body": ["var(--wms-font)", "Inter", "sans-serif"],
                        "label": ["var(--wms-font)", "Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .orange-gradient {
            background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
        }
    </style>
    <link rel="icon" type="image/png" href="favicon.png?v=7" />

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f49000">
    <link rel="apple-touch-icon" href="favicon.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</head>

<body class="bg-surface text-on-surface antialiased">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-surface group/design-root overflow-x-hidden font-body">
        <div class="layout-container flex h-full grow flex-col">

            <!-- Top Navigation Bar -->
            <header
                class="w-full bg-white border-b border-surface-variant px-6 py-3 mx-auto flex justify-between items-center sticky top-0 z-50 shadow-sm">
                <div class="flex items-center gap-3 text-on-surface">
                    <div class="h-16 w-auto flex items-center">
                        <img alt="SYS WMS Pro Logo" class="h-full object-contain scale-[1.3] origin-left"
                            src="https://ormjypixacnedlmqrxfq.supabase.co/storage/v1/object/public/SYS%20WMS%20Pro/logo/logo.png"
                            onerror="this.style.display='none';" />
                    </div>
                    <h2 class="text-xl font-black tracking-tighter text-slate-900">SYS WMS Pro</h2>
                </div>
                <nav class="flex items-center gap-6">
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="dashboard.html" data-i18n="dashboard">Dashboard</a>
                    <a class="text-primary font-bold border-b-2 border-primary pb-1 text-sm" href="workers.html" data-i18n="workers">Workers Management</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="idcards.html" data-i18n="idcards">ID Cards</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="attendance.html" data-i18n="attendance">Attendance</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="advances.html" data-i18n="advances">Cash Advances</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="reports.html" data-i18n="reports">Reports</a>
                    <div data-wms-settings-wrapper style="position:relative;">
                      <button data-wms-settings-trigger class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm flex items-center gap-1" style="background:none;border:none;cursor:pointer;">
                        <span data-i18n="settings" data-i18n="settings">Settings</span>
                        <span class="material-symbols-outlined" style="font-size:16px;line-height:1;">expand_more</span>
                      </button>
                    </div>
                </nav>
                <div class="flex items-center gap-2">
                  <button id="hdr-lang-btn" title="Toggle Language" class="flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-full border" style="border-color:var(--clr-border,#e9ecef);color:var(--clr-text-muted,#6c757d);background:var(--clr-surface-2,#f1f3f5);">
                    <span class="material-symbols-outlined text-base">language</span>&nbsp;<span id="hdr-lang-label">EN</span>
                  </button>
                  <button id="hdr-dark-btn" title="Toggle Dark Mode" class="w-9 h-9 rounded-full flex items-center justify-center border" style="background:var(--clr-surface-2,#f1f3f5);color:var(--clr-text-muted,#6c757d);border-color:var(--clr-border,#e9ecef);">
                    <span id="hdr-dark-icon" class="material-symbols-outlined text-xl">dark_mode</span>
                  </button>
                </div>
            </header>
            <main class="flex-1 flex flex-col h-full bg-surface overflow-hidden">
                <header class="px-8 py-6 border-b border-surface-container flex flex-wrap gap-4 justify-between items-center bg-surface-container-lowest flex-shrink-0">
                    <div class="flex items-center gap-4">
                        <h2 class="text-2xl font-bold text-on-surface tracking-tight" data-i18n="workers-mgmt">Workers Management</h2>
                        <div class="bg-orange-100 text-primary px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-[inset_0_1px_2px_rgba(255,255,255,0.5)] border border-orange-200/60">
                            <span class="material-symbols-outlined text-[16px]">groups</span>
                            <span id="kpi-total-workers">...</span> <span data-i18n="workers">Workers</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="btn-export-csv" class="flex cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-surface hover:bg-surface-container border border-outline-variant/30 text-on-surface-variant transition-all shadow-sm text-sm font-bold gap-2 group">
                            <span class="material-symbols-outlined text-[18px] text-primary group-hover:-translate-y-0.5 transition-transform">download</span>
                            <span data-i18n="export-csv">Export CSV</span>
                        </button>
                        <div class="relative">
                            <button id="btn-import-csv" class="flex cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-surface hover:bg-surface-container border border-outline-variant/30 text-on-surface-variant transition-all shadow-sm text-sm font-bold gap-2 group">
                                <span class="material-symbols-outlined text-[18px] text-primary group-hover:-translate-y-0.5 transition-transform">upload_file</span>
                                <span data-i18n="import-csv">Import CSV</span>
                            </button>
                            <input type="file" id="import-csv-file" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        </div>
                    </div>
                </header>
                
                <div class="flex-1 overflow-y-auto w-full p-6 lg:p-8">
                    <div class="layout-content-container flex flex-col max-w-[1400px] mx-auto w-full">

                    <!-- Onboarding Section -->
                    <div id="onboarding-section"
                        class="bg-gradient-to-br from-orange-50/50 to-white border border-orange-200/60 rounded-xl p-4 mb-6 flex flex-col md:flex-row gap-6 items-center shadow-sm scroll-mt-24">
                        <div class="flex-shrink-0">
                            <div class="relative group">
                                <div
                                    class="size-20 rounded-xl bg-white border-2 border-dashed border-orange-300 flex flex-col items-center justify-center text-orange-400 group-hover:border-orange-500 group-hover:text-orange-600 transition-all cursor-pointer overflow-hidden relative">
                                    <div id="photo-placeholder-icon"
                                        class="flex flex-col items-center pointer-events-none">
                                        <span class="material-symbols-outlined text-2xl mb-0.5">add_a_photo</span>
                                    </div>
                                    <img id="worker-photo-preview"
                                        class="absolute inset-0 w-full h-full object-cover hidden" />
                                    <input id="worker-photo-input"
                                        class="absolute inset-0 opacity-0 cursor-pointer z-10 w-full h-full" type="file"
                                        accept="image/*" />
                                </div>
                                <div
                                    class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-md shadow-sm pointer-events-none">
                                    <span class="material-symbols-outlined text-[10px]">edit</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 space-y-3 w-full">
                            <div class="flex justify-between items-center">
                                <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary text-[18px]">person_add</span>
                                    <span data-i18n="add-worker">New Worker Onboarding</span>
                                </h3>
                                <button onclick="window.open('https://github.com/osamaazizjaber-droid/sys-wms-pro/blob/main/js/form_sync.gs', '_blank')" class="text-xs font-bold text-primary bg-primary/10 hover:bg-primary/20 transition-colors px-3 py-1.5 rounded-lg flex items-center gap-1.5 shadow-sm border border-primary/20">
                                    <span class="material-symbols-outlined text-[14px]">description</span>
                                    <span data-i18n="google-form">Google Form Sync</span>
                                </button>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-4 gap-3 w-full">
                                <input id="worker-name"
                                    class="bg-white border-slate-200 py-1.5 px-3 rounded-lg text-sm focus:ring-primary focus:border-primary sm:col-span-2 w-full"
                                    placeholder="Full Legal Name" data-i18n-placeholder="full-name" type="text" />

                                <input id="worker-position"
                                    class="bg-white border-slate-200 py-1.5 px-3 rounded-lg text-sm focus:ring-primary focus:border-primary sm:col-span-1 w-full"
                                    placeholder="Position / Role" data-i18n-placeholder="position" type="text" />

                                <input id="worker-salary"
                                    class="bg-white border-slate-200 py-1.5 px-3 rounded-lg text-sm focus:ring-primary focus:border-primary sm:col-span-1 w-full"
                                    placeholder="Daily Salary (IQD)" data-i18n-placeholder="daily-salary" type="number" />
                            </div>
                        </div>
                        <div class="flex-shrink-0 w-full md:w-auto self-end mt-2 md:mt-0">
                            <button id="btn-submit-worker"
                                class="w-full md:w-auto bg-primary text-white h-[34px] px-6 rounded-lg font-bold text-sm shadow-sm hover:shadow-md hover:bg-orange-600 transition-all" data-i18n="submit">Submit</button>
                        </div>
                    </div>

                    <!-- Worker Table -->
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-50/50">
                                        <th
                                            class="px-6 py-4 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100" data-i18n="worker-id">
                                            Worker ID</th>
                                        <th
                                            class="px-6 py-4 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100" data-i18n="photo-name">
                                            Photo & Name</th>
                                        <th
                                            class="px-6 py-4 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100" data-i18n="position">
                                            Position</th>
                                        <th
                                            class="px-6 py-4 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100 text-right" data-i18n="daily-salary">
                                            Daily Salary (IQD)</th>
                                        <th
                                            class="px-6 py-4 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100 text-right" data-i18n="actions">
                                            Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="workers-tbody" class="divide-y divide-slate-100">
                                    <!-- Dynamic Rows Populated By workers.js -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Edit Worker Modal -->
    <div id="edit-worker-modal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] transition-all">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-900">Edit Worker Profile</h3>
                <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 transition-colors"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="edit-worker-id">

                <div class="flex items-center gap-4 mb-4">
                    <div
                        class="relative group size-20 rounded-xl bg-slate-100 border border-slate-200 flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                        <img id="edit-photo-preview" class="absolute inset-0 w-full h-full object-cover" />
                        <div
                            class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-white">edit</span>
                        </div>
                        <input id="edit-photo-input"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" type="file"
                            accept="image/*" />
                    </div>
                    <div class="text-sm text-slate-500">Update Photo (Optional)</div>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                        <input id="edit-worker-name"
                            class="w-full bg-white border-slate-200 p-2 rounded-lg text-sm focus:ring-primary focus:border-primary"
                            type="text" />
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Position</label>
                            <input id="edit-worker-position"
                                class="w-full bg-white border-slate-200 p-2 rounded-lg text-sm focus:ring-primary focus:border-primary"
                                type="text" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Daily Salary
                                (IQD)</label>
                            <input id="edit-worker-salary"
                                class="w-full bg-white border-slate-200 p-2 rounded-lg text-sm focus:ring-primary focus:border-primary"
                                type="number" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button id="btn-cancel-edit"
                    class="px-4 py-2 text-sm font-bold text-slate-500 hover:text-slate-700 transition-colors">Cancel</button>
                <button id="btn-save-edit"
                    class="px-6 py-2 bg-primary text-white rounded-lg text-sm font-bold shadow-sm hover:shadow-md transition-all">Save
                    Changes</button>
            </div>
        </div>
    </div>

    <!-- Supabase CDN and Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/workers.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const S = window.WMSSettings;
      if (!S) return;
      function syncUI() { 
        const ll = document.getElementById('hdr-lang-label'), di = document.getElementById('hdr-dark-icon');
        if (ll) ll.textContent = S.get('lang').toUpperCase(); 
        if (di) di.textContent = S.get('dark') === 'true' ? 'light_mode' : 'dark_mode'; 
      }
      document.getElementById('hdr-lang-btn')?.addEventListener('click', () => { S.set('lang', S.get('lang') === 'en' ? 'ar' : 'en'); syncUI(); });
      document.getElementById('hdr-dark-btn')?.addEventListener('click', () => { S.set('dark', S.get('dark') === 'true' ? 'false' : 'true'); syncUI(); });
      syncUI();
    });
    </script>
</body>

</html>
