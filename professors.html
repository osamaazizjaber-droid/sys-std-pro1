<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SYS STD Pro</title>
    <link rel="icon" type="image/png" href="favicon.png?v=7" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/themes.css"/>
    <script src="js/settings.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#8cceff",
                        "error-container": "#ffdad6",
                        "background": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "surface-container": "#edeeef",
                        "surface-container-low": "#f3f4f5",
                        "surface": "#f8f9fa",
                        "primary": "#8b5000",
                        "primary-container": "#f49000",
                        "on-surface": "#191c1d",
                        "on-background": "#191c1d",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "body": ["var(--wms-font)", "Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f49000">
    <link rel="apple-touch-icon" href="favicon.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased font-body">
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-surface group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">

            <!-- Top Navigation Bar -->
            <header class="w-full bg-white border-b border-surface-variant px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                <div class="flex items-center gap-3 text-on-surface">
                    <div class="h-16 w-auto flex items-center">
                        <img alt="SYS STD Pro Logo" class="h-10 w-auto object-contain" src="logo.png" />
                    </div>
                    <h2 class="text-xl font-black tracking-tighter text-primary">SYS STD Pro</h2>
                </div>
                <nav class="flex items-center gap-6">
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="dashboard.html" data-i18n="dashboard">Dashboard</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="students.html" data-i18n="students-mgmt">Student Management</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="idcards.html" data-i18n="idcards">ID Cards</a>
                    <a class="text-primary font-bold border-b-2 border-primary pb-1 text-sm" href="professors.html" data-i18n="professors">Professors</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="assignments.html" data-i18n="assignments">Assignments</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="attendance.html" data-i18n="attendance">Attendance</a>
                    <a class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm" href="reports.html" data-i18n="reports">Reports</a>
                    <div data-wms-settings-wrapper style="position:relative;">
                      <button data-wms-settings-trigger class="text-slate-500 font-medium hover:text-slate-900 transition-colors text-sm flex items-center gap-1" style="background:none;border:none;cursor:pointer;">
                        <span data-i18n="settings" data-i18n="settings">Settings</span>
                        <span class="material-symbols-outlined" style="font-size:16px;line-height:1;">expand_more</span>
                      </button>
                    </div>
                </nav>
                <div class="flex items-center gap-2">
                  <button id="hdr-lang-btn" title="Toggle Language"
                    class="flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-full border"
                    style="border-color:var(--clr-border,#e9ecef);color:var(--clr-text-muted,#6c757d);background:var(--clr-surface-2,#f1f3f5);">
                    <span class="material-symbols-outlined text-base">language</span>&nbsp;<span id="hdr-lang-label">EN</span>
                  </button>
                  <button id="hdr-dark-btn" title="Toggle Dark Mode"
                    class="w-9 h-9 rounded-full flex items-center justify-center border"
                    style="background:var(--clr-surface-2,#f1f3f5);color:var(--clr-text-muted,#6c757d);border-color:var(--clr-border,#e9ecef);">
                    <span id="hdr-dark-icon" class="material-symbols-outlined text-xl">dark_mode</span>
                  </button>
                </div>
            </header>

            <main class="flex-1 flex flex-col h-full bg-surface overflow-hidden">
                <header class="px-8 py-6 border-b border-surface-container flex flex-wrap gap-4 justify-between items-center bg-surface-container-lowest flex-shrink-0">
                    <div>
                        <h2 class="text-2xl font-bold text-on-surface tracking-tight" data-i18n="professors-tab-title">Professors Management</h2>
                        <p class="text-sm text-on-surface-variant mt-1" data-i18n="professors-tab-sub">Track and manage university professors.</p>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto w-full p-6 lg:p-8">
                    <div class="layout-content-container flex flex-col w-full max-w-[1200px] mx-auto flex-1 gap-6">
                        
                        <!-- Onboarding Section (Inline Form) -->
                        <div id="onboarding-section" class="bg-gradient-to-br from-orange-50/50 to-white border border-orange-200/60 rounded-xl p-4 mb-2 flex flex-col md:flex-row gap-6 items-center shadow-sm">
                            <div class="flex-shrink-0 relative group cursor-pointer" onclick="document.getElementById('prof-photo-input').click()">
                                <input type="file" id="prof-photo-input" accept="image/*" class="hidden">
                                <div id="photo-preview-box" class="size-16 rounded-xl bg-white border border-orange-200 flex items-center justify-center text-primary shadow-sm overflow-hidden group-hover:border-primary transition-all">
                                    <span id="photo-placeholder-icon" class="material-symbols-outlined text-3xl">add_a_photo</span>
                                    <img id="photo-preview-img" class="hidden w-full h-full object-cover">
                                </div>
                                <div class="absolute -bottom-1 -right-1 bg-primary text-white size-5 rounded-full flex items-center justify-center shadow-sm border border-white">
                                    <span class="material-symbols-outlined text-[12px]">edit</span>
                                </div>
                            </div>

                            <form id="professor-form" class="flex-1 flex flex-col md:flex-row gap-4 w-full items-end">
                                <div class="flex-1 space-y-2 w-full">
                                    <label class="text-[10px] uppercase font-black text-slate-400 tracking-widest block" data-i18n="prof-name">Professor Name</label>
                                    <div class="relative group">
                                        <div class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 pointer-events-none text-base">badge</div>
                                        <input type="text" id="prof-name-input" placeholder="Full Name..." data-i18n-placeholder="prof-name" autocomplete="off"
                                            class="w-full bg-white border border-slate-200 rounded-lg ps-10 pe-3 py-2 text-sm font-bold text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary/10 transition-all outline-none">
                                    </div>
                                </div>

                                <div class="flex-shrink-0 w-full md:w-auto">
                                    <button type="submit" id="btn-save-professor" class="w-full md:w-auto bg-primary text-white h-[38px] px-6 rounded-lg font-bold text-sm shadow-sm hover:shadow-md hover:bg-orange-600 transition-all flex items-center justify-center gap-2">
                                        <span class="material-symbols-outlined text-base">add_circle</span>
                                        <span data-i18n="add-professor">إضافة أستاذ</span>
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="flex items-center justify-between">
                            <h4 class="text-lg font-bold flex items-center gap-2 text-on-surface">
                                <span class="w-2 h-6 bg-primary rounded-full"></span>
                                <span data-i18n="professors-list">Professors Directory</span>
                            </h4>

                        <div class="flex items-center gap-3 w-full md:w-auto">
                            <button id="btn-export-csv" class="flex cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-surface hover:bg-surface-container border border-outline-variant/30 text-on-surface-variant transition-all shadow-sm text-sm font-bold gap-2 group">
                                <span class="material-symbols-outlined text-base group-hover:text-primary transition-colors">download</span>
                                <span data-i18n="export-csv">Export CSV</span>
                            </button>
                            <div class="relative">
                                <button id="btn-import-csv" class="flex cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-surface hover:bg-surface-container border border-outline-variant/30 text-on-surface-variant transition-all shadow-sm text-sm font-bold gap-2 group">
                                    <span class="material-symbols-outlined text-base group-hover:text-primary transition-colors">upload</span>
                                    <span data-i18n="import-csv">Import CSV</span>
                                </button>
                                <input type="file" id="import-csv-file" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            </div>
                        </div>

                        </div>

                        <div class="bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden border border-slate-100">
                            <div class="overflow-x-auto custom-scrollbar">
                                <table class="w-full text-start border-collapse">
                                    <thead>
                                        <tr class="bg-slate-50 border-b border-slate-200">
                                            <th class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-tighter" data-i18n="prof-id">ID</th>
                                            <th class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-tighter" data-i18n="prof-name">Name</th>
                                            
                                            <th class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-tighter" data-i18n="subject" data-i18n="subject">Subject</th>
                                            <th class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-tighter" data-i18n="teaching-stage" data-i18n="teaching-stage">Teaching Stage</th>
                                            <th class="p-4 text-[10px] font-black uppercase text-slate-500 tracking-tighter text-end" data-i18n="actions">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="professors-tbody" class="divide-y divide-slate-50">
                                        <tr><td colspan="5" class="p-12 text-center text-slate-400 font-bold tracking-widest"><span class="material-symbols-outlined animate-spin text-3xl mb-2">sync</span><br><span data-i18n="loading-professors">Loading Professors...</span></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/professors.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const S = window.WMSSettings;
      if (!S) return;
      function syncHeader() { 
        const ll = document.getElementById('hdr-lang-label'), di = document.getElementById('hdr-dark-icon');
        if (ll) ll.textContent = S.get('lang').toUpperCase(); 
        if (di) di.textContent = S.get('dark') === 'true' ? 'light_mode' : 'dark_mode'; 
      }
      document.getElementById('hdr-lang-btn')?.addEventListener('click', () => { S.set('lang', S.get('lang') === 'en' ? 'ar' : 'en'); syncHeader(); });
      document.getElementById('hdr-dark-btn')?.addEventListener('click', () => { S.set('dark', S.get('dark') === 'true' ? 'false' : 'true'); syncHeader(); });
      syncHeader();
    });
    </script>
</body>
</html>
